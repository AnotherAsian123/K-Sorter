<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#F2E3BC">
  <title>K-Sorter</title>
  <link rel="icon" type="image/png" href="/static/img/favicon.png">
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="/static/js/htmx.min.js" defer></script>
  <script src="/static/js/idiomorph-ext.min.js" defer></script>
  <!-- app.js must load BEFORE alpine: it registers Alpine.data() via the
       alpine:init event, which Alpine fires the instant its script runs. -->
  <script src="/static/js/app.js" defer></script>
  <script src="/static/js/alpine.min.js" defer></script>
</head>
<body hx-ext="morph">
  <div class="ambient" aria-hidden="true">
    <span class="blob b1"></span>
    <span class="blob b2"></span>
    <span class="blob b3"></span>
    <span class="note n1">&#9834;</span>
    <span class="note n2">&#9835;</span>
    <span class="note n3">&#9834;</span>
  </div>
  <div class="wrap">
    <header class="top">
      <div class="brand">
        <h1>K&#8209;Sorter <span class="beat">&#9834;</span></h1>
        <p class="tagline">sort once, sort TWICE</p>
      </div>
      <span class="spacer"></span>
      <nav class="links" aria-label="Pages">
        <a href="/">Sort</a>
        <a href="/manage">Database</a>
      </nav>
      <button class="toggle" onclick="toggleTheme()" aria-label="Toggle light/dark theme">&#9789;</button>
    </header>
    {% block content %}{% endblock %}
    <p class="muted" style="text-align:center;margin-top:30px">
      Calm sorting for your fancams. Nothing moves into the wrong place &mdash; and anything moved can be undone.
    </p>
  </div>
</body>
</html>
