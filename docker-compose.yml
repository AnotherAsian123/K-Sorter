# Local / testing compose. On Unraid, prefer the Community Apps template.
services:
  k-sorter:
    build: .
    image: ghcr.io/anotherasian123/k-sorter:latest
    container_name: k-sorter
    ports:
      - "8080:8080"
    environment:
      PUID: "99"
      PGID: "100"
      UMASK: "022"
      KSORTER_PORT: "8080"
      # Optional watch-folder mode:
      # KSORTER_WATCH_DIR: "/media/_watch"
      # KSORTER_WATCH_DEST: "/media/K-Pop"
    volumes:
      - ./config:/config
      - /path/to/your/media:/media
    restart: unless-stopped
